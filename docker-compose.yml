version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taxi_comptabilite
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: taxi_mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
